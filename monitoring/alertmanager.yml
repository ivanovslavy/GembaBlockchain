# Alertmanager config for GembaBlockchain — delivers Prometheus alerts to the operator
# by EMAIL, reusing the gembascan.io contact-form SMTP account.
#
# SECRET HYGIENE (this repo is public): the SMTP password is NEVER in this file. It is
# read at runtime from a file that is provisioned on the box only and gitignored:
#     /etc/alertmanager/smtp_password   (chmod 600, root-owned)
# Put the gembascan.io contact-form SMTP password there. Everything else below is public.
#
# Fill these three to match the gembascan.io contact-form mailbox:
#   smtp_smarthost  — the SMTP host:port the contact form uses (e.g. smtp.zoho.eu:587)
#   smtp_from       — the contact-form sender address (e.g. noreply@gembascan.io)
#   smtp_auth_username — usually the same as smtp_from
# Alerts are delivered TO the operator inbox (to: below).

global:
  resolved_timeout: 5m
  smtp_smarthost: "SMTP_HOST:587"          # <- gembascan.io contact-form SMTP host:port
  smtp_from: "noreply@gembascan.io"        # <- gembascan.io contact-form sender
  smtp_auth_username: "noreply@gembascan.io"
  smtp_auth_password_file: /etc/alertmanager/smtp_password  # <- secret, provisioned on the box
  smtp_require_tls: true

route:
  receiver: gemba-email
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h        # re-notify every 3h while an alert is still firing
  routes:
    # critical alerts (chain halt, bonded-ratio red line) re-notify faster
    - matchers: [ 'severity="critical"' ]
      receiver: gemba-email
      repeat_interval: 30m

receivers:
  - name: gemba-email
    email_configs:
      - to: "ivanovslavy@gmail.com"        # <- operator inbox (where YOU read the alerts)
        send_resolved: true
        headers:
          Subject: '[GembaChain {{ .CommonLabels.severity }}] {{ .CommonLabels.alertname }}'
