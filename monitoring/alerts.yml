# Prometheus alerting rules for GembaBlockchain (Phase 9). The bonded-ratio alerts
# implement the ADR-008 thresholds (target ~66%, floor ~50%, red line ~33%): with
# zero inflation there is no dynamic-inflation lever, so a falling bonded ratio is
# the early warning to act (tail-reward rate / gas floor — ADR-008).
groups:
  - name: gemba-security-budget
    rules:
      # bonded ratio (the security KPI) — three escalating levels per ADR-008.
      - alert: BondedRatioBelowTarget
        expr: gemba_bonded_ratio < 0.66
        for: 30m
        labels: { severity: info }
        annotations:
          summary: "Bonded ratio {{ $value | humanizePercentage }} below the 66% target (ADR-008)"
          description: "Security budget weakening. Consider raising the tail-reward rate / gas floor."
      - alert: BondedRatioBelowFloor
        expr: gemba_bonded_ratio < 0.50
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Bonded ratio {{ $value | humanizePercentage }} below the 50% floor (ADR-008)"
          description: "Cost-to-attack dropping. Governance should act on the tail-reward rate."
      - alert: BondedRatioRedLine
        expr: gemba_bonded_ratio < 0.33
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Bonded ratio {{ $value | humanizePercentage }} below the 33% RED LINE (ADR-008)"
          description: "Below 1/3 bonded, halting the chain becomes cheap. Immediate governance action."

  - name: gemba-liveness
    rules:
      # chain halt: block height not advancing.
      - alert: ChainHalted
        expr: increase(cometbft_consensus_height[5m]) == 0
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Chain height has not advanced for 5m — possible halt"
          description: "See docs/runbooks/halt-recovery.md."
      - alert: LowPeerCount
        expr: cometbft_p2p_peers < 3
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Node has < 3 peers — check seeds/persistent_peers"

  - name: gemba-host
    rules:
      # disk pressure — archive nodes grow unbounded; validators must prune.
      - alert: NodeDiskFillingUp
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.15
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Node disk < 15% free — review pruning (validators) or capacity (archive)"

  # Economic modules (feesplit / rewardstreamer / tailreward) are fail-soft by design:
  # a panic/error skips that block instead of halting the chain (AU-1). The danger is
  # that this is SILENT — blocks keep producing and dashboards look healthy while the
  # 40%-fee->faucet split or the validator-reward stream is quietly disabled every block.
  # These alerts make that loud. The counters come from telemetry.IncrCounter in each
  # module's BeginBlocker (needs [telemetry] enabled + prometheus-retention-time > 0 in
  # app.toml; confirm the exact metric names at the node's /metrics).
  - name: gemba-economic-modules
    rules:
      - alert: FeeSplitStalled
        expr: increase(gemba_feesplit_skipped_blocks[10m]) > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "feesplit skipped {{ $value }} blocks in 10m — 40% fee->faucet split is silently disabled"
          description: "x/feesplit BeginBlocker is failing repeatedly (panic/error). The chain is producing but the faucet is not being refilled. Check node logs for 'feesplit: SplitFees'. Supply is safe (skipping mints/loses nothing)."
      - alert: RewardStreamerStalled
        expr: increase(gemba_rewardstreamer_skipped_blocks[10m]) > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "rewardstreamer skipped {{ $value }} blocks in 10m — validator reward stream silently halted"
          description: "x/rewardstreamer BeginBlocker is failing repeatedly. Validators stop receiving the reserve-funded stream. Check logs for 'rewardstreamer: StreamRewards'. Supply is safe."
      - alert: TailRewardStalled
        expr: increase(gemba_tailreward_skipped_blocks[10m]) > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "tailreward skipped {{ $value }} blocks in 10m — post-reserve tail reward silently halted"
          description: "x/tailreward BeginBlocker is failing repeatedly. Check logs for 'tailreward: StreamTailReward'. Supply is safe."
