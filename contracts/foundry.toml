[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# Local GembaBlockchain devnet (EVM JSON-RPC). Use --private-key with a
# DEVNET-ONLY key; never commit real keys (CLAUDE.md §3, §14).
[rpc_endpoints]
gemba_devnet = "http://localhost:8545"
