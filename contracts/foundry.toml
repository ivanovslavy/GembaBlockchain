[profile.default]
auto_detect_remappings = false # pin the remapping set — auto-inference varies with lib/ layout and CHANGES BYTECODE via metadata (breaks the gembaswap pair init-code hash + CREATE2 address determinism)
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200

# Local GembaBlockchain devnet (EVM JSON-RPC). Use --private-key with a
# DEVNET-ONLY key; never commit real keys (CLAUDE.md §3, §14).
[rpc_endpoints]
gemba_devnet = "http://localhost:8545"
