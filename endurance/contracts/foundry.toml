[profile.default]
src = "src"
out = "out"
test = "test"
# Reuse the repo's already-vendored forge-std (tests only). `src` contracts are dependency-
# free, so the generated artifacts/*.json need no libs — the Pi runs Node only, never forge.
libs = ["../../contracts/lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["forge-std/=../../contracts/lib/forge-std/src/"]
