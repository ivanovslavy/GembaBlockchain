# Local PostgreSQL for the access-control backend (RLS demo / integration tests).
# Loads db/schema.sql on first boot and sets the gemba_app dev password so the app
# can connect as the NON-superuser role (which is what makes RLS apply).
#
#   docker compose up -d
#   DATABASE_URL="postgres://gemba_app:devpassword@localhost:5432/gemba" \
#     npm run test:integration
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gemba
      POSTGRES_PASSWORD: postgres   # superuser pw (admin only; never used by the app)
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/dev-role.sql:/docker-entrypoint-initdb.d/02-dev-role.sql:ro
