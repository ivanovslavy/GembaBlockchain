# CI tests (proposed 2026-07-17, ACTIVATED 2026-07-18 as part of mainnet prep).
# Runs the two full test suites on every push/PR so "all tests green" always has a
# machine-checked, linkable record (the gap the mainnet-readiness audit flagged).
name: tests
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1 # match the local toolchain
      - name: install pinned deps (contracts/lib is gitignored; pins match the local clones)
        working-directory: contracts
        run: |
          forge install --no-git \
            foundry-rs/forge-std@v1.9.4 \
            OpenZeppelin/openzeppelin-contracts@v5.1.0 \
            OpenZeppelin/openzeppelin-contracts-upgradeable@v5.1.0
      - name: forge test
        working-directory: contracts
        run: forge test -vv

  # Deliberate-copy guards: these files exist in two places ON PURPOSE (the gembapay
  # drop-in kit ships standalone; each load harness is tarred to boxes self-contained,
  # so they cannot share a lib dir). The copies must never silently diverge.
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gembapay drop-in must stay byte-identical to the canonical source
        run: cmp contracts/src/payments/GmbCollector.sol contracts/integrations/gembapay-hardhat/GmbCollector.sol
      - name: shared load-test libs must stay byte-identical between stress/ and endurance/
        run: |
          for f in provider nonceManager rateLimiter metrics txLogger nodeProbe; do
            cmp "stress/lib/$f.js" "endurance/lib/$f.js" || { echo "DIVERGED: $f.js"; exit 1; }
          done

  chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: chain/go.mod
      - name: go test
        working-directory: chain
        run: go test -count=1 ./...
