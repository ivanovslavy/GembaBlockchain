name: secret-scan
# Fail the build if any secret (private key, BIP-39 mnemonic, API token) is committed.
# Added after pentest P-1 (docs/security-pentest-2026-06-24.md).
on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan full history, not just the latest commit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
