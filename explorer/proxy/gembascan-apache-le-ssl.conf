# =============================================================================
# LIVE Apache TLS vhost for GembaScan on 13.140.139.82
# (/etc/apache2/sites-enabled/gembascan-le-ssl.conf). Snapshot kept in the repo.
# Same-origin reverse proxy: /api + /auth + /socket -> backend:4000, /rpc ->
# archive node:8545, everything else -> frontend:3000. TLS via a Cloudflare Origin
# cert. Account login is ENABLED (Auth0); the earlier csrf-stub workaround was
# removed once ACCOUNT_ENABLED=true (see docs/runbooks/explorer-account-login.md).
# =============================================================================
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName testnet.gembascan.io
    ServerAlias www.testnet.gembascan.io gembascan.io www.gembascan.io
    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    # never cache runtime config (envs.js/configs) so key/branding changes apply immediately
    <LocationMatch "^/assets/(envs\.js|configs/)">
        Header set Cache-Control "no-store, must-revalidate"
    </LocationMatch>
    # un-monochrome the network logo (Blockscout forces brightness(0) invert(1) -> white)
    RequestHeader unset Accept-Encoding
    AddOutputFilterByType SUBSTITUTE text/html
    Substitute "s|</head>|<style>img[alt$='network logo'],img[alt$='network icon']{filter:none!important}</style></head>|ni"
    # live-update websocket
    ProxyPass /socket/ ws://127.0.0.1:4000/socket/
    ProxyPassReverse /socket/ ws://127.0.0.1:4000/socket/
    # Etherscan/REST API + backend
    ProxyPass /api http://127.0.0.1:4000/api
    ProxyPassReverse /api http://127.0.0.1:4000/api
    # everything else -> frontend
    # static brand assets (logo/icon/favicon) served locally, not proxied
    ProxyPass /brand !
    Alias /brand /var/www/gembascan-brand
    <Directory /var/www/gembascan-brand>
        Require all granted
    </Directory>

    ProxyPass /auth http://127.0.0.1:4000/auth
    ProxyPassReverse /auth http://127.0.0.1:4000/auth

    # public EVM JSON-RPC — REMOVED ENTIRELY (pentest P-2, 2026-06-26).
    # The archive box must NOT serve a public wallet RPC: it co-hosts Blockscout's
    # heavy indexer, exposed debug_*/txpool_*, and hung on batched JSON-RPC (a cheap
    # unauthenticated DoS lever). Public RPC now lives ONLY on the validator nodes
    # (rpc1/rpc2/rpc3), behind single-CORS nginx + rate-limit + CF-only ufw.
    # Blockscout is unaffected — it reads the node INTERNALLY on 127.0.0.1:8545, which
    # never goes through this vhost. Any external /rpc request is refused (410 Gone),
    # so the dangerous-namespace + batch-hang surface is gone, not merely throttled.
    ProxyPass /rpc !
    RedirectMatch 410 "^/rpc(/.*)?$"

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
    ErrorLog ${APACHE_LOG_DIR}/gembascan_error.log
    CustomLog ${APACHE_LOG_DIR}/gembascan_access.log combined

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/ssl/cloudflare/gembascan-origin.pem
SSLCertificateKeyFile /etc/ssl/cloudflare/gembascan-origin.key
</VirtualHost>
</IfModule>
