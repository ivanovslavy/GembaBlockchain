# =============================================================================
# GembaScan single-origin reverse proxy.
#
# Why this exists: the Blockscout frontend (v1.37.0) sends a custom request
# header (`updated-gas-oracle`) on /api/v2/stats that the older backend (6.8.0)
# cors_plug allow-list does NOT permit. When the UI and API are on different
# origins (e.g. UI on :80, API on :4000) the browser issues a CORS preflight,
# the backend rejects the unknown header, the /api/v2/stats fetch is blocked,
# the homepage code does `.sort()` on the resulting `undefined`, and the whole
# page falls into the "500 — Oops! Something went wrong" error boundary. curl
# never does a preflight, so the API always *looked* healthy from the shell.
#
# Fix: serve UI + API + websocket from ONE origin (port 80) so same-origin
# access needs no CORS at all; and for cross-origin callers (someone opening
# http://localhost while the app host is the LAN IP) add a permissive CORS shim
# that echoes the requested headers — so the `updated-gas-oracle` preflight
# passes. The live-update websocket is proxied as plain ws:// here, fixing the
# frontend's previous wss:// -> ERR_SSL_PROTOCOL_ERROR against the non-TLS node.
# =============================================================================
events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # ---- Backend Etherscan/REST/GraphQL API (with cross-origin CORS shim) ----
    location /api/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        # Echo exactly what the browser asked for -> any custom header (e.g.
        # updated-gas-oracle) is permitted, immune to frontend/backend skew.
        add_header Access-Control-Allow-Headers     $http_access_control_request_headers always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Max-Age           86400 always;
        add_header Content-Type                     "text/plain; charset=utf-8" always;
        add_header Content-Length                   0 always;
        return 204;
      }
      proxy_pass http://backend:4000;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Replace the backend's fixed CORS headers with origin-echoing ones.
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      add_header Access-Control-Allow-Origin      $http_origin always;
      add_header Access-Control-Allow-Credentials true always;
    }

    # ---- Live-update websocket (plain ws upstream) ----
    location /socket/ {
      proxy_pass http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
    }

    # ---- Everything else -> the Blockscout frontend (Next.js) ----
    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
