syntax = "proto3";
package gemba.rewardstreamer.v1;
import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "gemba/rewardstreamer/v1/params.proto";
option go_package = "github.com/ivanovslavy/GembaBlockchain/chain/x/rewardstreamer/types";

service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc UpdateFormulaParams(MsgUpdateFormulaParams) returns (MsgUpdateFormulaParamsResponse);
}
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "gemba/x/rewardstreamer/MsgUpdateParams";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}
message MsgUpdateParamsResponse {}

// MsgUpdateFormulaParams sets the reward-FORMULA params (regenesis §4) at runtime.
// Only the gov module account may execute it — this is the governance kill-switch /
// retune lever for the reward stream (SEC audit M2): pass enabled=false to halt
// formula payouts, or adjust rate/floor/cap/budget, all without a chain upgrade.
// Field semantics mirror types.FormulaParams (stored JSON under its own key).
message MsgUpdateFormulaParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "gemba/x/rewardstreamer/MsgUpdateFormulaParams";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bool enabled = 2;
  // rate_per_day: fraction of stake earned per day (e.g. "0.01" = 1%).
  string rate_per_day = 3 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  // floor_per_day / cap_per_day: per-validator daily reward bounds (agmb).
  string floor_per_day = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  string cap_per_day = 5 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  uint64 blocks_per_day = 6;
  string reward_denom = 7;
  // max_total_per_day: AGGREGATE daily budget across all validators (agmb; 0 = no cap) — M4.
  string max_total_per_day = 8 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
message MsgUpdateFormulaParamsResponse {}
