# gitleaks config for GembaBlockchain (public repo). Blocks committed secrets.
# Run locally:  gitleaks detect --no-banner --config .gitleaks.toml
# Enforced in CI: .github/workflows/secret-scan.yml
# Added after pentest P-1 (docs/security-pentest-2026-06-24.md): a hardcoded BIP-39
# mnemonic in an init script was reused for the live testnet faucet account.
title = "GembaBlockchain secret scan"

[extend]
useDefault = true   # keep gitleaks' built-in rules (private keys, API tokens, etc.)

[[rules]]
id = "bip39-mnemonic"
description = "Hardcoded BIP-39 mnemonic (12/15/18/21/24 lowercase words) in a QUOTED string"
# Require the word-run to be QUOTED — real leaks are assignments/array literals like
# DEV0_MNEMONIC="word word ..." or "word word ...". This avoids flagging ordinary English
# prose (12+ short words), which an unquoted regex matches (pentest: 2 such false positives
# in docs/*.md and llms-full.txt). A genuine mnemonic in code/config is always quoted.
regex = '''["'`]([a-z]{3,8} ){11,23}[a-z]{3,8}["'`]'''
tags = ["mnemonic", "key"]

[[rules]]
id = "evm-private-key-hex"
description = "Raw 32-byte hex private key (0x + 64 hex)"
regex = '''\b0x[a-fA-F0-9]{64}\b'''
tags = ["privatekey"]

# This rule cannot tell a 32-byte private key from a 32-byte tx hash / init-code
# hash / EIP-1167 bytecode word. Exempt ONLY the documented-benign files, ONLY from
# this rule (they are still scanned by every other rule).
[rules.allowlist]
paths = [
  '''docs/testnet-status\.md$''',              # tx hashes of the recorded first transfers
  '''endurance/contracts/src/Clones\.sol$''',  # EIP-1167 minimal-proxy bytecode constants
  '''contracts/SECURITY\.md$''',               # audit doc citing the public pair init-code hash
]

[allowlist]
description = "Known-safe matches: placeholders, public constants, test fixtures, gitignored secret store"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)\.gitleaks\.toml$''',
  '''wallet-backup/''',              # gitignored secret store (never committed anyway)
  '''.*\.t\.sol$''',                 # Foundry tests use throwaway/anvil keys
  # Tightened 2026-07-19: the former blanket '(^|/)test/' and faucet-attack.test.mjs
  # path allowlists are GONE — test dirs are scanned like everything else; the known
  # public anvil keys are allowlisted by VALUE below instead.
  '''(^|/)gemba-validator/genesis\.json$''',   # the PUBLISHED testnet genesis: consensus PUBLIC keys ("pubkey.key" base64) trip generic-api-key; everything in this file is public by definition
]
# NOTE: allowlist regexes match the captured SECRET (gitleaks regexTarget default),
# NOT the whole line — an entry like `KEYALGO="..."` never matches and silently
# allowlists nothing (learned 2026-07-19).
regexes = [
  '''\b0x[a-fA-F0-9]{40}\b''',                                    # public EVM addresses (20 bytes) — NOT secrets; the evm-private-key-hex rule still catches 0x+64-hex keys
  '''0x0{64}''',                                                  # zero hash
  '''0x6e71edae12b1b97f4d1f60370fef10105fa2faae0126114a169c64845d6126c9''', # public Uniswap PERMIT_TYPEHASH
  '''<.*mnemonic.*>''',                                           # angle-bracket placeholders
  '''anvil|hardhat''',                                            # secrets literally labeled as anvil/hardhat fixtures
  '''0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80''', # well-known public anvil key #0
  '''0x?59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d''', # well-known public anvil key #1 (services test fixtures)
  '''0x?5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a''', # well-known public anvil key #2
  '''eth_secp256k1''',                                            # key ALGORITHM name (gemba.params.sh KEYALGO) — not a secret
  '''6LdKpxAtAAAAAIxrVl3crE_BbfzMYGBvqVDJmpqT''',                 # reCAPTCHA SITE key (NEXT_PUBLIC_*, shipped to every browser — public by design). EXACT value only: a leaked reCAPTCHA SECRET key has the same 6L... format and must still be caught
  '''6LdeUg8tAAAAAHyfaixIg9B6i88Ck8YR1vLzAfem''',                 # the previous (superseded) reCAPTCHA SITE key — same public class, lives in history
]
